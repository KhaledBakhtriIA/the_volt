services:
  redpanda:
    image: redpandadata/redpanda:v24.2.13
    container_name: volt-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    networks:
      - volt-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: volt-redis
    ports:
      - "6379:6379"
    networks:
      - volt-network
    restart: unless-stopped

  volt-data-api:
    image: volt-data-api:latest
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: volt-data-api
    ports:
      - "${DATA_API_PORT:-8000}:8000"
    environment:
      # Core API settings
      DATA_API_HOST: "0.0.0.0"
      DATA_API_PORT: "8000"
      DATA_API_INTERVAL: "${DATA_API_INTERVAL:-1d}"
      DATA_API_LOOKBACK_DAYS: "${DATA_API_LOOKBACK_DAYS:-365}"
      
      # Feature flags
      DATA_API_BROWSER_ENABLED: "${DATA_API_BROWSER_ENABLED:-false}"
      DATA_API_BROWSER_HEADLESS: "${DATA_API_BROWSER_HEADLESS:-true}"
      DATA_API_BROWSER_TIMEOUT_MS: "${DATA_API_BROWSER_TIMEOUT_MS:-30000}"
      DATA_API_REDDIT_ENABLED: "${DATA_API_REDDIT_ENABLED:-false}"
      DATA_API_MACRO_ENABLED: "${DATA_API_MACRO_ENABLED:-false}"
      DATA_API_DESKTOP_ENABLED: "${DATA_API_DESKTOP_ENABLED:-false}"
      DATA_API_VISION_ENABLED: "${DATA_API_VISION_ENABLED:-false}"
      DATA_API_STOCK_MARKET_ENABLED: "${DATA_API_STOCK_MARKET_ENABLED:-false}"
      DATA_API_TRADING_STRATEGY_ENABLED: "${DATA_API_TRADING_STRATEGY_ENABLED:-false}"
      DATA_API_TRADING_MISTAKES_ENABLED: "${DATA_API_TRADING_MISTAKES_ENABLED:-false}"
      DATA_API_TOKENINSIGHT_ENABLED: "${DATA_API_TOKENINSIGHT_ENABLED:-false}"
      DATA_API_FINANCE_QUERY_STREAM_ENABLED: "${DATA_API_FINANCE_QUERY_STREAM_ENABLED:-false}"
      DATA_API_REALTIME_MODE_ENABLED: "${DATA_API_REALTIME_MODE_ENABLED:-false}"
      
      # API Keys and credentials
      DATA_API_REDDIT_CLIENT_ID: "${DATA_API_REDDIT_CLIENT_ID:-}"
      DATA_API_REDDIT_CLIENT_SECRET: "${DATA_API_REDDIT_CLIENT_SECRET:-}"
      DATA_API_REDDIT_USER_AGENT: "${DATA_API_REDDIT_USER_AGENT:-volt-data-api/1.0}"
      DATA_API_FRED_API_KEY: "${DATA_API_FRED_API_KEY:-}"
      DATA_API_FCS_API_KEY: "${DATA_API_FCS_API_KEY:-}"
      DATA_API_TOKENINSIGHT_API_KEY: "${DATA_API_TOKENINSIGHT_API_KEY:-}"
      
      # Finance Query Stream settings
      DATA_API_FINANCE_QUERY_WS_URL: "${DATA_API_FINANCE_QUERY_WS_URL:-wss://stream.financequery.com/ws}"
      DATA_API_FINANCE_QUERY_CHANNELS: "${DATA_API_FINANCE_QUERY_CHANNELS:-ticker,trades,orderbook}"
      DATA_API_TICK_TOPIC: "${DATA_API_TICK_TOPIC:-volt_ticks}"
      DATA_API_KAFKA_BOOTSTRAP_SERVERS: "${DATA_API_KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}"
      DATA_API_REDIS_URL: "${DATA_API_REDIS_URL:-redis://redis:6379/0}"
      
      # Desktop capture settings
      DATA_API_DESKTOP_CAPTURE_INTERVAL_SECONDS: "${DATA_API_DESKTOP_CAPTURE_INTERVAL_SECONDS:-5}"
      
      # Data storage
      DATA_API_DATA_ROOT: "${DATA_API_DATA_ROOT:-data_api/data}"
      DATA_API_PREFER_PARQUET: "${DATA_API_PREFER_PARQUET:-false}"
      
    volumes:
      - ./data_api/data:/app/data_api/data
      - ./data_api/logs:/app/data_api/logs
    
    networks:
      - volt-network

    depends_on:
      - redpanda
      - redis
    
    restart: unless-stopped
    
    # Production healthcheck (python, not curl — curl isn't in the slim image)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: volt-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./infrastructure/monitoring/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - volt-network
    depends_on:
      - volt-data-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: volt-grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-volt-change-me}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - volt-network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  volt-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
