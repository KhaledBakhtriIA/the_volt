global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: volt-data-api
    metrics_path: /metrics
    static_configs:
      - targets: ["volt-data-api:8000"]
        labels:
          service: volt-data-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
