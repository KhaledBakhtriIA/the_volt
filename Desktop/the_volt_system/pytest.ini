[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (with I/O)
    slow: Slow tests
    skip_ci: Skip in CI environment
    asyncio: Tests for asyncio
