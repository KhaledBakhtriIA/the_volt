name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.8.4
      - run: ruff check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            infrastructure/docker/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r infrastructure/docker/requirements.txt
      - name: Run test suite
        run: pytest tests -q --tb=short --junitxml=test-results/junit.xml
      - name: Coverage report
        run: pytest tests -q --tb=short --cov=. --cov-report=term-missing:skip-covered --cov-fail-under=0 | tail -40
      - name: Restore reliability history
        if: always()
        uses: actions/cache@v4
        with:
          path: .reliability
          key: reliability-${{ github.run_id }}
          restore-keys: |
            reliability-
      - name: Reliability intelligence (agent-data-fabric)
        if: always()
        run: |
          pip install -q git+https://github.com/KhaledBakhtriIA/agent-data-fabric.git
          reliability ingest test-results/junit.xml --db .reliability/history.db
          reliability report --db .reliability/history.db
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-${{ github.run_id }}
          path: test-results/junit.xml

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
